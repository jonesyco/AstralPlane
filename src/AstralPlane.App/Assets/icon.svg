<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Portal core: deep-space radial so the neon reads at any size -->
    <radialGradient id="core" cx="50%" cy="46%" r="58%">
      <stop offset="0%"  stop-color="#1A1140"/>
      <stop offset="55%" stop-color="#0B0722"/>
      <stop offset="100%" stop-color="#050310"/>
    </radialGradient>

    <!-- Ring gradients: violet <-> cyan, rotated per ring for a symmetric colour flow -->
    <linearGradient id="ringA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#2FE9FF"/>
      <stop offset="50%"  stop-color="#7C6BFF"/>
      <stop offset="100%" stop-color="#B14BFF"/>
    </linearGradient>
    <linearGradient id="ringB" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#B14BFF"/>
      <stop offset="50%"  stop-color="#7C6BFF"/>
      <stop offset="100%" stop-color="#2FE9FF"/>
    </linearGradient>
    <linearGradient id="ringC" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%"   stop-color="#2FE9FF"/>
      <stop offset="55%"  stop-color="#8A54FF"/>
      <stop offset="100%" stop-color="#C24BFF"/>
    </linearGradient>

    <!-- Plane edge + fill -->
    <linearGradient id="planeStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#4DEEFF"/>
      <stop offset="100%" stop-color="#B14BFF"/>
    </linearGradient>
    <linearGradient id="planeFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#120A33"/>
      <stop offset="100%" stop-color="#05030F"/>
    </linearGradient>
    <linearGradient id="planeSheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="35%"  stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Emissive glow -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ambient" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>

    <!-- Portal disc mask so the deep-space fill stays perfectly circular -->
    <clipPath id="disc"><circle cx="256" cy="256" r="228"/></clipPath>
    <clipPath id="planeClip"><rect x="181" y="205" width="150" height="102" rx="16"/></clipPath>
  </defs>

  <!-- Portal core disc -->
  <circle cx="256" cy="256" r="228" fill="url(#core)"/>

  <!-- Ambient portal halo (kept inside the disc) -->
  <g clip-path="url(#disc)">
    <circle cx="256" cy="256" r="150" fill="none" stroke="#5E39C9" stroke-width="60" opacity="0.28" filter="url(#ambient)"/>
  </g>

  <!-- Portal rim -->
  <circle cx="256" cy="256" r="228" fill="none" stroke="#3A2A6B" stroke-width="3" opacity="0.8"/>
  <circle cx="256" cy="256" r="221" fill="none" stroke="#7C6BFF" stroke-width="1.5" opacity="0.4"/>

  <!-- Three interlocking (Borromean) rings, clipped to the portal -->
  <g clip-path="url(#disc)" fill="none" stroke-linecap="round">
    <g filter="url(#glow)">
      <circle cx="256" cy="178" r="120" stroke="url(#ringA)" stroke-width="13"/>
      <circle cx="188" cy="295" r="120" stroke="url(#ringB)" stroke-width="13"/>
      <circle cx="324" cy="295" r="120" stroke="url(#ringC)" stroke-width="13"/>
    </g>
    <!-- crisp inner highlight for sharp edges -->
    <g opacity="0.9">
      <circle cx="256" cy="178" r="120" stroke="#CFefff" stroke-width="2.2" opacity="0.35"/>
      <circle cx="188" cy="295" r="120" stroke="#E9ddff" stroke-width="2.2" opacity="0.35"/>
      <circle cx="324" cy="295" r="120" stroke="#d9f6ff" stroke-width="2.2" opacity="0.35"/>
    </g>
  </g>

  <!-- Central luminous plane, tilted 45 degrees -->
  <g transform="rotate(45 256 256)">
    <!-- glow behind the plane -->
    <rect x="181" y="205" width="150" height="102" rx="16" fill="url(#planeStroke)" opacity="0.5" filter="url(#glow)"/>
    <!-- plane body -->
    <rect x="181" y="205" width="150" height="102" rx="16" fill="url(#planeFill)"/>
    <!-- starfield inside the plane -->
    <g clip-path="url(#planeClip)" fill="#ffffff">
      <circle cx="205" cy="225" r="1.6" opacity="0.9"/>
      <circle cx="243" cy="217" r="1.1" opacity="0.6"/>
      <circle cx="286" cy="231" r="2.0" opacity="1"/>
      <circle cx="312" cy="221" r="1.2" opacity="0.7"/>
      <circle cx="197" cy="252" r="1.3" opacity="0.75"/>
      <circle cx="229" cy="246" r="0.9" opacity="0.5"/>
      <circle cx="266" cy="256" r="1.7" opacity="0.95"/>
      <circle cx="301" cy="249" r="1.0" opacity="0.6"/>
      <circle cx="319" cy="270" r="1.5" opacity="0.85"/>
      <circle cx="212" cy="278" r="1.9" opacity="1"/>
      <circle cx="248" cy="284" r="1.1" opacity="0.65"/>
      <circle cx="279" cy="290" r="1.4" opacity="0.8"/>
      <circle cx="306" cy="295" r="0.9" opacity="0.5"/>
      <circle cx="225" cy="300" r="1.2" opacity="0.7"/>
      <circle cx="262" cy="234" r="0.8" opacity="0.45"/>
      <circle cx="290" cy="272" r="1.0" opacity="0.6"/>
    </g>
    <!-- sheen + crisp emissive edge -->
    <rect x="181" y="205" width="150" height="102" rx="16" fill="url(#planeSheen)"/>
    <rect x="181" y="205" width="150" height="102" rx="16" fill="none" stroke="url(#planeStroke)" stroke-width="3.5"/>
    <rect x="181" y="205" width="150" height="102" rx="16" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  </g>
</svg>
